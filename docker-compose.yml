version: "3.8"

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: rn-ai-chat-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
      POSTGRES_DB: ${DB_NAME:-ai_chat}
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - rn-ai-chat-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ai_chat}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Node.js 服务端
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: rn-ai-chat-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      DB_NAME: ${DB_NAME:-ai_chat}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      MIMO_KEY: ${MIMO_KEY}
      BOCHA_KEY: ${BOCHA_KEY}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:-your_access_token_secret}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-your_refresh_token_secret}
    networks:
      - rn-ai-chat-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # Expo Web 静态文件
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: rn-ai-chat-client
    restart: unless-stopped
    networks:
      - rn-ai-chat-net
    deploy:
      resources:
        limits:
          memory: 256M

  # Nginx 反向代理
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: rn-ai-chat-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
      - client
    volumes:
      # 挂载 client 构建产物（可选，用于热更新）
      - ./client/dist:/usr/share/nginx/html:ro
    networks:
      - rn-ai-chat-net
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres_data:
    driver: local

networks:
  rn-ai-chat-net:
    driver: bridge
